# Build and deploy the Vite SPA to GitHub Pages on every push to main.
#
# Notes:
#   - VITE_BASE = '/CheckClankrFees/' so asset URLs match the Pages subpath.
#   - VITE_WALLETCONNECT_PROJECT_ID is read from repo secrets. Without it,
#     browser-extension wallets still work; mobile WalletConnect QR pairing
#     does not. Set the secret in repo Settings → Secrets and variables →
#     Actions (free Reown ID from https://cloud.reown.com).
#   - No tests yet; the build itself catches import/type breakage.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Build
        env:
          VITE_BASE: /CheckClankrFees/
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
