# Daily refresh of SUPPORTERS.md from on-chain ETH donations on Base.
# Also re-injects the top-10 block between the SUPPORTERS:START / END
# markers in README.md. If anything changed, opens an auto-commit.
#
# ETHERSCAN_API_KEY is optional. Without it we hit the unauthenticated
# Etherscan v2 endpoint which works for low-volume reads but is rate-limited.

name: Update supporters

on:
  schedule:
    - cron: '17 7 * * *'   # 07:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Generate SUPPORTERS.md
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: node scripts/update-supporters.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SUPPORTERS.md README.md
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh supporters from on-chain donations"
            git push
          fi
