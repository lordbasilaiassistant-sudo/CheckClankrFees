# Daily refresh of SUPPORTERS.md from on-chain ETH donations on Base.
# Also re-injects the top-10 block between the SUPPORTERS:START / END
# markers in README.md. If anything changed, opens an auto-commit.
#
# Uses our own RPC aggregator pool (free Base endpoints) — no Etherscan,
# no external explorer APIs, no API keys. State is persisted to
# scripts/.supporters-state.json so each cron run resumes from where the
# previous one stopped.

name: Update supporters

on:
  schedule:
    - cron: '17 7 * * *'   # 07:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install deps
        run: npm ci
      - name: Generate SUPPORTERS.md
        run: node scripts/update-supporters.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SUPPORTERS.md README.md scripts/.supporters-state.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh supporters from on-chain donations"
            git push
          fi
